<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Torre della Follia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
:root {
  --bg:       #0a0c0f;
  --bg-panel: #111520;
  --bg-card:  #161d28;
  --bg-hover: #1a2333;
  --bg-act:   #1d2d44;
  --border:   rgba(90,130,190,0.13);
  --border-b: rgba(90,130,190,0.28);
  --gold:     #c9a84c;
  --gold-d:   #8a6e2f;
  --gold-g:   rgba(201,168,76,0.12);
  --t1:       #f0e8d8;
  --t2:       #b8aa98;
  --t3:       #7a6e62;
  --red:      #c45a5a;
  --green:    #5ab48f;
  --blue:     #5a8fd4;
  --purple:   #8f72d4;
  --amber:    #c4954a;
  --font-d:   'Cinzel', serif;
  --font-b:   'Crimson Pro', Georgia, serif;
  --sw:       242px;
  --tr:       .18s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font-b);font-size:17.6px;line-height:1.7;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-head{padding:1.25rem 1.25rem .75rem;border-bottom:1px solid var(--border);}
.sb-back{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-d);font-size:9px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;text-decoration:none;margin-bottom:.75rem;transition:color var(--tr);}
.sb-back:hover{color:var(--gold);}
.sb-title{font-family:var(--font-d);font-size:12px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.sb-sub{font-size:11px;color:var(--t3);font-style:italic;}
.nav-section{padding:.5rem 0;border-bottom:1px solid var(--border);}
.nav-lbl{font-size:9px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;padding:0 1.25rem .3rem;font-family:var(--font-d);}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 1.25rem;background:none;border:none;color:var(--t2);font-family:var(--font-b);font-size:14px;cursor:pointer;text-align:left;transition:var(--tr);position:relative;}
.nav-btn:hover{color:var(--t1);background:var(--bg-hover);}
.nav-btn.active{color:var(--gold);background:var(--bg-act);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
.nav-btn.dm-only{display:none;}
.nav-ico{font-size:11px;width:14px;text-align:center;color:var(--t3);flex-shrink:0;}
.nav-btn.active .nav-ico{color:var(--gold);}
.sb-foot{margin-top:auto;padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.dm-toggle{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:3px;background:none;cursor:pointer;font-family:var(--font-d);font-size:9px;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;transition:var(--tr);width:100%;}
.dm-toggle:hover{border-color:var(--gold-d);color:var(--gold);}
.dm-toggle.active{border-color:var(--gold);color:var(--gold);background:var(--gold-g);}
.dm-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:var(--tr);}
.dm-toggle.active .dm-dot{background:var(--gold);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:2rem 2.5rem;background:var(--bg);}
.section{display:none;}
.section.active{display:block;}

/* ── HEADER SEZIONE ── */
.sec-head{margin-bottom:1.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);position:relative;}
.sec-head::after{content:'';position:absolute;bottom:-1px;left:0;width:50px;height:1px;background:var(--gold);}
.sec-title{font-family:var(--font-d);font-size:21px;font-weight:600;color:var(--t1);letter-spacing:.04em;margin-bottom:3px;}
.sec-sub{font-size:13px;color:var(--t3);font-style:italic;}

/* ── CARD ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:1.1rem 1.4rem;margin-bottom:.9rem;transition:border-color var(--tr);}
.card:hover{border-color:var(--border-b);}
.card-title{font-family:var(--font-d);font-size:12px;font-weight:600;letter-spacing:.09em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;}
.card-body{font-size:14px;color:var(--t2);line-height:1.75;white-space:pre-line;}

/* ── TAGS ── */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag{font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid var(--border);color:var(--t3);font-family:var(--font-d);letter-spacing:.04em;}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:.9rem;}
.stat-lbl{font-size:9px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;font-family:var(--font-d);margin-bottom:5px;}
.stat-val{font-family:var(--font-d);font-size:15px;color:var(--t1);}

/* ── GROUP LABEL ── */
.group-lbl{font-family:var(--font-d);font-size:9px;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;margin:1.5rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--border);}

/* ── AMBIENTAZIONE TAB ── */
.amb-tabs{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:1.25rem;flex-wrap:wrap;}
.amb-tab{padding:6px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-family:var(--font-d);font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-bottom:-1px;transition:var(--tr);}
.amb-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.amb-tab:hover:not(.active){color:var(--t2);}
.amb-panel{display:none;}
.amb-panel.active{display:block;}

/* ── ECONOMIA ── */
.eco-valute{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;margin-bottom:1.5rem;}
.eco-valuta{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:.75rem 1rem;}
.eco-val-sigla{font-family:var(--font-d);font-size:16px;color:var(--gold);font-weight:600;}
.eco-val-nome{font-size:12px;color:var(--t2);margin:.2rem 0;}
.eco-val-note{font-size:11px;color:var(--t3);font-style:italic;}
.eco-converter{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:1rem 1.4rem;margin-bottom:1.5rem;}
.eco-conv-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.5rem;}
.eco-conv-input{background:var(--bg);border:1px solid var(--border-b);border-radius:3px;padding:6px 10px;color:var(--t1);font-family:var(--font-b);font-size:14px;width:100px;outline:none;}
.eco-conv-input:focus{border-color:var(--gold-d);}
.eco-conv-select{background:var(--bg);border:1px solid var(--border-b);border-radius:3px;padding:6px 8px;color:var(--t1);font-family:var(--font-b);font-size:14px;outline:none;cursor:pointer;}
.eco-conv-result{font-size:13px;color:var(--t2);line-height:1.8;}
.eco-conv-result span{color:var(--gold);font-family:var(--font-d);font-size:12px;}
.eco-salari{margin-bottom:1.5rem;}
.eco-salari table,.eco-table{width:100%;border-collapse:collapse;font-size:13px;}
.eco-salari th,.eco-table th{font-family:var(--font-d);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border);}
.eco-salari td{padding:.5rem .75rem;border-bottom:1px solid var(--border);color:var(--t2);vertical-align:top;}
.eco-salari tr:last-child td,.eco-table tr:last-child td{border-bottom:none;}
.eco-salari td:first-child{color:var(--t1);}
.eco-salari td.mono{font-family:var(--font-d);font-size:11px;color:var(--amber);white-space:nowrap;}
.eco-cat-tabs{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.eco-cat-tab{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--t2);font-family:var(--font-b);font-size:13px;cursor:pointer;transition:var(--tr);}
.eco-cat-tab:hover{color:var(--t1);border-color:var(--border-b);}
.eco-cat-tab.active{color:var(--gold);border-color:var(--gold-d);background:var(--gold-g);}
.eco-table{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.eco-table th{background:var(--bg-panel);}
.eco-table td{padding:.55rem 1rem;border-bottom:1px solid var(--border);color:var(--t2);vertical-align:top;}
.eco-table tr:hover td{background:var(--bg-hover);}
.eco-table td:first-child{color:var(--t1);}
.eco-table td.costo{font-family:var(--font-d);font-size:11px;color:var(--amber);white-space:nowrap;}
.eco-table td.note-col{font-size:11px;color:var(--t3);font-style:italic;}

/* ── MAPPA ── */
.map-viewer{width:100%;height:65vh;overflow:hidden;position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;cursor:grab;user-select:none;}
.map-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.75rem;}
.map-placeholder-icon{font-size:32px;opacity:.3;}
.map-placeholder-text{font-family:var(--font-d);font-size:10px;letter-spacing:.15em;color:var(--t3);text-transform:uppercase;}

/* ── SVILUPPO CAPITOLI ── */
.cap-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:1rem;overflow:hidden;transition:border-color var(--tr);}
.cap-card:hover{border-color:var(--border-b);}
.cap-card.completato{border-left:2px solid var(--green);}
.cap-card.in-corso{border-left:2px solid var(--gold);}
.cap-card.pianificato{border-left:2px solid var(--t3);}

.cap-head{display:flex;align-items:center;gap:10px;padding:.9rem 1.4rem;cursor:pointer;background:var(--bg-panel);}
.cap-num{font-family:var(--font-d);font-size:9px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;white-space:nowrap;}
.cap-title{flex:1;font-size:14px;color:var(--t1);font-family:var(--font-d);letter-spacing:.02em;}
.cap-stato{font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;font-family:var(--font-d);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.cap-stato.completato{border-color:var(--green);color:var(--green);}
.cap-stato.in-corso{border-color:var(--gold-d);color:var(--gold);}
.cap-stato.pianificato{border-color:var(--t3);color:var(--t3);}
.cap-arr{font-size:10px;color:var(--t3);transition:transform var(--tr);}
.cap-card.open .cap-arr{transform:rotate(90deg);}
.cap-wrap.open .cap-arr{transform:rotate(90deg);}

.cap-body{display:none;padding:1.2rem 1.4rem;border-top:1px solid var(--border);}
.cap-card.open .cap-body{display:block;}
.cap-wrap.open .cap-body{display:block;}

.cap-sec{font-size:10px;letter-spacing:.18em;color:var(--t2);text-transform:uppercase;font-family:var(--font-d);margin:1rem 0 .35rem;padding-top:.75rem;border-top:1px solid var(--border);}
.cap-sec:first-child{margin-top:0;border-top:none;padding-top:0;}
.cap-text{font-size:15.4px;color:var(--t1);line-height:1.75;white-space:pre-line;}
.cap-luogo{font-size:12px;color:var(--t2);font-style:italic;margin-bottom:.75rem;}

.ev-list{margin:.4rem 0;padding:0;list-style:none;}
.ev-list li{font-size:13px;color:var(--t2);padding:3px 0;padding-left:14px;position:relative;}
.ev-list li::before{content:'›';position:absolute;left:0;color:var(--gold-d);}

.callout-m{background:rgba(143,68,68,.08);border-left:2px solid #8f4444;padding:.65rem .9rem;margin:.6rem 0;font-size:13px;color:#b07070;line-height:1.7;white-space:pre-line;border-radius:0 3px 3px 0;}

/* oggetti nel capitolo */
.cap-obj-list{margin:.4rem 0;}
.cap-obj{background:var(--bg-panel);border:1px solid var(--border);border-radius:3px;padding:.5rem .8rem;margin-bottom:.4rem;}
.cap-obj-name{font-family:var(--font-d);font-size:10px;letter-spacing:.07em;color:var(--gold);margin-bottom:2px;}
.cap-obj-note{font-size:12px;color:var(--t3);}

/* ── MUSIC CARD ── */
.music-card {
  margin-top: 0;
  margin-bottom: .75rem;
  padding: .7rem .9rem;
  background: rgba(29,185,84,.05);
  border: 1px solid rgba(29,185,84,.2);
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: .75rem;
}
.music-card-ico { font-size: 16px; flex-shrink: 0; opacity: .6; }
.music-card-info { flex: 1; min-width: 0; }
.music-card-scene {
  font-size: 9px; letter-spacing: .16em;
  color: rgba(29,185,84,.75); text-transform: uppercase;
  font-family: var(--font-d); margin-bottom: 2px;
}
.music-card-title {
  font-family: var(--font-d); font-size: 12.5px; color: var(--t1);
  letter-spacing: .02em; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.music-card-artist { font-size: 11.5px; color: var(--t2); font-style: italic; margin-top: 1px; }

/* ── MODAL PASSWORD DM ── */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;}
.pw-overlay.open{display:flex;}
.pw-box{background:var(--bg-panel);border:1px solid var(--border-b);border-radius:4px;padding:1.75rem;max-width:340px;width:92%;text-align:center;}
.pw-title{font-family:var(--font-d);font-size:13px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:1.25rem;}
.pw-input{width:100%;padding:9px 12px;background:var(--bg-card);border:1px solid var(--border-b);border-radius:3px;color:var(--t1);font-family:var(--font-b);font-size:15px;margin-bottom:.75rem;text-align:center;letter-spacing:.15em;outline:none;}
.pw-input:focus{border-color:var(--gold-d);}
.pw-btn{padding:8px 24px;background:none;border:1px solid var(--gold-d);color:var(--gold);font-family:var(--font-d);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:var(--tr);width:100%;}
.pw-btn:hover{background:var(--gold-g);}
.pw-err{font-size:12px;color:var(--red);margin-top:.5rem;display:none;font-style:italic;}

/* ── PULSANTE GLOBO DM ── */
.globo-dm-btn {
  display: none; /* mostrato solo se isMaster */
  align-items: center; gap: 8px;
  margin-top: 1rem; padding: .6rem 1.1rem;
  background: rgba(201,168,76,.07); border: 1px solid var(--gold-d);
  border-radius: 3px; cursor: pointer;
  font-family: var(--font-d); font-size: 10px; letter-spacing: .14em;
  color: var(--gold); text-transform: uppercase;
  transition: background var(--tr), border-color var(--tr);
  width: 100%;
}
.globo-dm-btn:hover { background: rgba(201,168,76,.15); border-color: var(--gold); }
.globo-dm-btn .ico { font-size: 14px; }
.globo-dm-btn.dm-visible { display: flex; }

/* ── MODAL PUZZLE FULLSCREEN ── */
.puzzle-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.96);
  flex-direction: column;
}
.puzzle-modal.open { display: flex; }
.puzzle-modal-bar {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: .5rem 1.25rem; background: rgba(10,12,15,.95);
  border-bottom: 1px solid var(--border);
}
.puzzle-modal-title {
  font-family: var(--font-d); font-size: 11px; letter-spacing: .18em;
  color: var(--gold); text-transform: uppercase;
}
.puzzle-modal-close {
  padding: 5px 14px; border-radius: 3px; border: 1px solid var(--border);
  background: none; color: var(--t3); font-family: var(--font-d);
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  cursor: pointer; transition: var(--tr);
}
.puzzle-modal-close:hover { border-color: var(--red); color: var(--red); }
.puzzle-modal iframe {
  flex: 1; border: none; width: 100%; display: block;
}


/* ── DIVIDER LABEL ── */
.divider-lbl {
  font-family: var(--font-d); font-size: 9px; letter-spacing: .22em;
  color: var(--t3); text-transform: uppercase;
  display: flex; align-items: center; gap: .75rem;
  margin: 1.75rem 0 1rem;
}
.divider-lbl::before, .divider-lbl::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}


/* ── PANORAMICA TABS ── */
.pan-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.2rem;border-bottom:1px solid var(--border);padding-bottom:.6rem;}
.pan-tab{padding:5px 14px;border-radius:3px 3px 0 0;font-family:var(--font-d);font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);border-bottom:none;background:none;color:var(--t3);cursor:pointer;transition:var(--tr);}
.pan-tab:hover{color:var(--t2);border-color:var(--border-b);}
.pan-tab.active{background:var(--bg-card);color:var(--gold);border-color:var(--gold-d);}
.pan-panel{display:none;}
.pan-panel.active{display:block;}

/* ── MOBILE ── */
.mob-bar{display:none;}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;}
.mob-overlay.open{display:block;}

@media(max-width:680px){
  .app{flex-direction:column;}
  .mob-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg-panel);border-bottom:1px solid var(--border);padding:.6rem 1rem;flex-shrink:0;z-index:100;position:sticky;top:0;}
  .mob-bar-title{font-family:var(--font-d);font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;}
  .mob-ham{background:none;border:1px solid var(--border);border-radius:3px;color:var(--t2);width:34px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:0;transition:border-color var(--tr),color var(--tr);}
  .mob-ham:hover{border-color:var(--gold-d);color:var(--gold);}
  .mob-ham span{display:block;width:16px;height:1.5px;background:currentColor;border-radius:1px;transition:transform .2s,opacity .2s;}
  .mob-ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
  .mob-ham.open span:nth-child(2){opacity:0;}
  .mob-ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .22s ease;width:min(var(--sw),88vw);}
  .sidebar.open{transform:translateX(0);}
  .main{padding:1.25rem 1rem;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:3px;}
</style>
</head>
<body>

<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>
<div class="mob-bar">
  <span class="mob-bar-title">Torre della Follia</span>
  <button class="mob-ham" id="mob-ham" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <a href="index.html" class="sb-back">← Portale</a>
      <div class="sb-title">Torre della Follia</div>
      <div class="sb-sub">One Shot — Kaelvaran</div>
    </div>
    <div class="nav-section">
      <div class="nav-lbl">Generale</div>
      <button class="nav-btn active" data-section="panoramica" onclick="showSection('panoramica')">
        <span class="nav-ico">◎</span>Panoramica
      </button>
      <button class="nav-btn" data-section="ambientazione" onclick="showSection('ambientazione')">
        <span class="nav-ico">⌂</span>Ambientazione
      </button>
      <button class="nav-btn" data-section="economia" onclick="showSection('economia')">
        <span class="nav-ico">◈</span>Economia
      </button>
      <button class="nav-btn" data-section="mappe" onclick="showSection('mappe')">
        <span class="nav-ico">⊞</span>Mappe
      </button>
    </div>
    <div class="nav-section" id="nav-master" style="display:none;">
      <div class="nav-lbl">Master</div>
      <button class="nav-btn" data-section="sviluppo" onclick="showSection('sviluppo')">
        <span class="nav-ico">◆</span>Sviluppo
      </button>
    </div>
    <div class="sb-foot">
      <button class="dm-toggle" id="dm-toggle" onclick="toggleDM()">
        <div class="dm-dot" id="dm-dot"></div>

      </button>

  <main class="main" id="main">
    <div id="section-panoramica"    class="section active"></div>
    <div id="section-ambientazione" class="section"></div>
    <div id="section-economia"      class="section"></div>
    <div id="section-mappe"         class="section"></div>
    <div id="section-sviluppo"      class="section"></div>
  </main>
</div>

<!-- MODAL PASSWORD DM -->
<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">◑ Accesso Modalità DM</div>
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPW()">
    <button class="pw-btn" onclick="checkPW()">Sblocca</button>
    <div class="pw-err" id="pw-err">Password errata.</div>
  </div>
</div>

<!-- MODAL PUZZLE GLOBO -->
<div class="puzzle-modal" id="puzzle-modal">
  <div class="puzzle-modal-bar">
    <span class="puzzle-modal-title">◈ Il Globo di Metallo — Puzzle Arcano</span>
    <button class="puzzle-modal-close" onclick="closePuzzle()">✕ Chiudi</button>
  </div>
  <iframe id="puzzle-iframe" src="" title="Puzzle Globo"></iframe>
</div>

<script src="data_panoramica.js"></script>
<script src="data_economia.js"></script>
<script src="data_torre.js"></script>
<script>
const ADMIN_PW = 'tresil2025';
let isMaster = false;

// ── INIT ───────────────────────────────────────────
function isDMSaved() {
  try { return localStorage.getItem('torre_dm') === 'true'; } catch(e) {}
  try { return sessionStorage.getItem('torre_dm') === 'true'; } catch(e) {}
  return false;
}
function saveDM(val) {
  try { if (val) localStorage.setItem('torre_dm','true'); else localStorage.removeItem('torre_dm'); } catch(e) {}
  try { if (val) sessionStorage.setItem('torre_dm','true'); else sessionStorage.removeItem('torre_dm'); } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  if (isDMSaved()) isMaster = true;
  buildPanoramica();
  buildAmbientazione();
  buildEconomia();
  buildMappe();
  buildSviluppo();
  showSection('panoramica');
  if (isMaster) updateDMUI();
});

// ── MOBILE SIDEBAR ─────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
  document.getElementById('mob-ham').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
  document.getElementById('mob-ham').classList.remove('open');
}
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (sb.classList.contains('open')) closeSidebar(); else openSidebar();
}

// ── NAVIGAZIONE ────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id)?.classList.add('active');
  document.querySelector(`[data-section="${id}"]`)?.classList.add('active');
  if (window.innerWidth <= 680) closeSidebar();
}

// ── MODALITÀ DM ────────────────────────────────────
function toggleDM() {
  if (isMaster) {
    isMaster = false;
    saveDM(false);
    updateDMUI();
  } else {
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-err').style.display = 'none';
    document.getElementById('pw-overlay').classList.add('open');
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  }
}

function checkPW() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    isMaster = true;
    saveDM(true);
    document.getElementById('pw-overlay').classList.remove('open');
    updateDMUI();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}

function updateDMUI() {
  const toggle = document.getElementById('dm-toggle');
  toggle.classList.toggle('active', isMaster);
  document.getElementById('dm-label').textContent = isMaster ? 'DM attivo' : 'Modalità DM';
  document.getElementById('nav-master').style.display = isMaster ? 'block' : 'none';
  // Mostra/nasconde pulsante puzzle globo
  const globoBtn = document.getElementById('globo-btn');
  if (globoBtn) globoBtn.classList.toggle('dm-visible', isMaster);
  // Se DM disattivato, chiudi il modal puzzle se aperto
  if (!isMaster) closePuzzle();
  // Ridisegna sezione sviluppo che dipende da isMaster
  buildSviluppo();
  // Se siamo su sviluppo ma DM disattivato, torna a panoramica
  if (!isMaster && document.getElementById('section-sviluppo').classList.contains('active')) {
    showSection('panoramica');
  }
}

// ── HELPERS ────────────────────────────────────────
function card(title, body, extra = '') {
  const d = document.createElement('div');
  d.className = 'card ' + extra;
  if (title) d.innerHTML = `<div class="card-title">${title}</div>`;
  const b = document.createElement('div');
  b.className = 'card-body';
  b.textContent = body;
  d.appendChild(b);
  return d;
}

// ── PANORAMICA ─────────────────────────────────────
function buildPanoramica() {
  const c = document.getElementById('section-panoramica');
  const p = PANORAMICA_DATA;
  const td = torreDati;
  c.innerHTML = '';

  const titolo = (p.mondo && p.mondo.nome) || 'Kaelvaran';

  c.innerHTML = `<div class="sec-head">
    <div class="sec-title">Panoramica</div>
    <div class="sec-sub">Il mondo di ${titolo}</div>
  </div>`;

  if (p.mondo && p.mondo.citazione) {
    const cit = document.createElement('div');
    cit.style.cssText = 'font-style:italic;color:var(--t3);font-size:14px;margin-bottom:1.2rem;padding-left:.75rem;border-left:2px solid var(--border);';
    cit.innerHTML = `${p.mondo.citazione} <span style="opacity:.7;">— ${p.mondo.citazione_fonte}</span>`;
    c.appendChild(cit);
  }
  if (p.mondo && p.mondo.descrizione) c.appendChild(card('Il Mondo', p.mondo.descrizione));
  if (p.mondo && p.mondo.concetti) p.mondo.concetti.forEach(con => c.appendChild(card(con.titolo, con.testo)));
}


function buildAmbientazione() {
  const c = document.getElementById('section-ambientazione');
  const p = PANORAMICA_DATA;
  c.innerHTML = `<div class="sec-head"><div class="sec-title">Ambientazione</div><div class="sec-sub">Il mondo di Kaelvaran — storia, culture e luoghi</div></div>`;

  // La Frattura
  if (p.frattura) {
    c.innerHTML += `<div class="divider-lbl">La Frattura</div>`;
    if (p.frattura.citazione) {
      const cit = document.createElement('div');
      cit.style.cssText = 'font-style:italic;color:var(--t3);font-size:14px;margin-bottom:1.2rem;padding-left:.75rem;border-left:2px solid var(--border);';
      cit.innerHTML = `${p.frattura.citazione} <span style="opacity:.7;">— ${p.frattura.citazione_fonte}</span>`;
      c.appendChild(cit);
    }
    if (p.frattura.sezioni) p.frattura.sezioni.forEach(s => c.appendChild(card(s.titolo, s.testo)));
  }

  // I Fatati
  if (p.fatati) {
    c.innerHTML += `<div class="divider-lbl">I Fatati</div>`;
    c.appendChild(card(p.fatati.sottotitolo || p.fatati.titolo, p.fatati.testo));
    if (p.fatati.dettaglio) c.appendChild(card('Approfondimento', p.fatati.dettaglio));
  }
  if (p.mondoDeiSogni) c.appendChild(card(p.mondoDeiSogni.titolo, p.mondoDeiSogni.testo));

  // I Continenti
  if (p.stirpi && p.stirpi.length) {
    c.innerHTML += `<div class="divider-lbl">I Continenti</div>`;
    const nota = document.createElement('div');
    nota.style.cssText = 'font-size:13px;color:var(--t3);margin-bottom:1rem;';
    nota.textContent = `Cinque culture nate dalla Frattura, evolute per millenni in isolamento. Clicca su un continente per espanderlo.`;
    c.appendChild(nota);

    p.stirpi.forEach(s => {
      const wrap = document.createElement('div');
      wrap.className = 'cap-card';
      wrap.style.marginBottom = '.5rem';

      const head = document.createElement('div');
      head.className = 'cap-head';
      head.style.borderLeft = '3px solid ' + (s.colore || 'var(--gold)');
      head.innerHTML = `
        <div class="cap-num" style="color:${s.colore || 'var(--gold)'};font-size:13px;letter-spacing:.1em;">◈</div>
        <div style="flex:1;">
          <div class="cap-title">${s.nome}</div>
          <div style="font-size:11px;color:var(--t3);font-style:italic;">${s.sottotitolo || ''}</div>
        </div>
        <span class="cap-arr">▶</span>`;
      head.onclick = () => wrap.classList.toggle('open');

      const body = document.createElement('div');
      body.className = 'cap-body';

      if (s.motto) {
        const motto = document.createElement('div');
        motto.style.cssText = 'font-style:italic;color:var(--t3);font-size:14px;margin-bottom:1rem;padding-left:.75rem;border-left:2px solid var(--border);';
        motto.textContent = s.motto;
        body.appendChild(motto);
      }
      if (s.sintesi) body.appendChild(card('In sintesi', s.sintesi));
      [
        { k: 'territorio', t: 'Territorio' },
        { k: 'societa',    t: 'Società' },
        { k: 'magia',      t: 'Magia' },
        { k: 'volonta',    t: 'La Volontà' },
        { k: 'fatati',     t: 'I Fatati' },
        { k: 'situazione', t: 'Situazione attuale' },
        { k: 'sviluppo',   t: 'Approfondimento' }
      ].forEach(({ k, t }) => {
        if (s[k]) body.appendChild(card(t, s[k]));
      });
      if (!s.sviluppo) {
        const todo = document.createElement('div');
        todo.style.cssText = 'font-size:12px;color:var(--t3);font-style:italic;padding:.5rem .75rem;border:1px dashed var(--border);border-radius:3px;margin-top:.5rem;';
        todo.textContent = '— Approfondimento in sviluppo —';
        body.appendChild(todo);
      }
      wrap.appendChild(head);
      wrap.appendChild(body);
      c.appendChild(wrap);
    });
  }

  // L'Atollo
  if (p.anello) {
    c.innerHTML += `<div class="divider-lbl">L'Atollo</div>`;
    if (p.anello.testo) c.appendChild(card(p.anello.sottotitolo || p.anello.titolo, p.anello.testo));
    if (p.anello.luoghi) p.anello.luoghi.forEach(l => c.appendChild(card(l.nome + (l.sottotitolo ? ' — ' + l.sottotitolo : ''), l.testo)));
  }
  if (p.luoghi && p.luoghi.length) {
    p.luoghi.forEach(l => c.appendChild(card(l.nome, l.testo)));
  }
}

// ── ECONOMIA ───────────────────────────────────────
function buildEconomia() {
  const c = document.getElementById('section-economia');
  const eco = TRESIL_ECO;
  c.innerHTML = '';

  c.innerHTML = `<div class="sec-head">
    <div class="sec-title">Economia</div>
    <div class="sec-sub">Sistema monetario dell'isola di Tresil — riferimento visuale</div>
  </div>`;

  // Valute
  const valuteLbl = document.createElement('div');
  valuteLbl.className = 'group-lbl'; valuteLbl.textContent = 'Valute';
  c.appendChild(valuteLbl);
  const valGrid = document.createElement('div');
  valGrid.className = 'eco-valute';
  eco.valute.forEach(v => {
    const d = document.createElement('div'); d.className = 'eco-valuta';
    d.innerHTML = `<div class="eco-val-sigla">${v.sigla}</div><div class="eco-val-nome">${v.nome}</div><div class="eco-val-note">${v.note}</div>`;
    valGrid.appendChild(d);
  });
  c.appendChild(valGrid);

  // Salari
  const salLbl = document.createElement('div');
  salLbl.className = 'group-lbl'; salLbl.textContent = 'Salari di riferimento';
  c.appendChild(salLbl);
  const salT = document.createElement('table'); salT.className = 'eco-salari';
  salT.innerHTML = '<thead><tr><th>Ruolo</th><th>Al giorno</th><th>Al mese</th><th>Note</th></tr></thead>';
  const stb = document.createElement('tbody');
  eco.salari.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.ruolo}</td><td class="mono">${s.giorno}</td><td class="mono">${s.mese}</td><td>${s.note}</td>`;
    stb.appendChild(tr);
  });
  salT.appendChild(stb); c.appendChild(salT);

  // Prezzi per categoria
  const prezLbl = document.createElement('div');
  prezLbl.className = 'group-lbl'; prezLbl.style.marginTop = '1.5rem';
  prezLbl.textContent = 'Prezzi e merci'; c.appendChild(prezLbl);

  const tabWrap = document.createElement('div'); tabWrap.className = 'eco-cat-tabs';
  const panWrap = document.createElement('div');

  eco.categorie.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'eco-cat-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat.icona + ' ' + cat.nome;
    btn.onclick = () => {
      tabWrap.querySelectorAll('.eco-cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      panWrap.querySelectorAll('.eco-panel').forEach(p => p.style.display = 'none');
      document.getElementById('eco-panel-' + cat.id).style.display = 'block';
    };
    tabWrap.appendChild(btn);
    const panel = document.createElement('div');
    panel.className = 'eco-panel'; panel.id = 'eco-panel-' + cat.id;
    panel.style.display = i === 0 ? 'block' : 'none';
    const table = document.createElement('table'); table.className = 'eco-table';
    table.innerHTML = '<thead><tr><th>Voce</th><th>Costo</th><th>Note</th></tr></thead>';
    const tb = document.createElement('tbody');
    cat.voci.forEach(v => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${v.nome}</td><td class="costo">${v.costo}</td><td class="note-col">${v.note}</td>`;
      tb.appendChild(tr);
    });
    table.appendChild(tb); panel.appendChild(table); panWrap.appendChild(panel);
  });
  c.appendChild(tabWrap); c.appendChild(panWrap);
}


// ── MAPPE ──────────────────────────────────────────
function buildMappe() {
  const c = document.getElementById('section-mappe');
  c.innerHTML = `
    <div class="sec-head"><div class="sec-title">Mappe</div><div class="sec-sub">Pianta della Torre — aggiungere il file maps/torre.jpg</div></div>
    <div class="map-viewer">
      <div class="map-placeholder">
        <div class="map-placeholder-icon">⊞</div>
        <div class="map-placeholder-text">Mappa da caricare</div>
        <div style="font-size:12px;color:var(--t3);font-style:italic;margin-top:.25rem;">Aggiungi il file <code style="font-family:monospace;background:var(--bg-card);padding:2px 5px;border-radius:2px;">maps/torre.jpg</code></div>
      </div>
    </div>`;
}

// ── SVILUPPO CAPITOLI (solo DM) ────────────────────
function buildSviluppo() {
  const c = document.getElementById('section-sviluppo');
  c.innerHTML = `<div class="sec-head"><div class="sec-title">Sviluppo</div><div class="sec-sub">Capitoli e guida al master</div></div>`;

  if (!isMaster) {
    c.innerHTML += `<div class="card" style="text-align:center;padding:2rem"><div class="card-body" style="color:var(--t3);font-style:italic">Attiva la modalità DM per accedere a questa sezione.</div></div>`;
    return;
  }

  // Lore segreta
  if (torreDati.loreSegreta) {
    const loreBox = document.createElement('div');
    loreBox.className = 'callout-m';
    loreBox.style.marginBottom = '1.25rem';
    loreBox.innerHTML = `<strong style="font-family:var(--font-d);font-size:9px;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:.4rem;">⚠ Lore riservata DM</strong>${torreDati.loreSegreta}`;
    c.appendChild(loreBox);
  }

  // Capitoli
  torreDati.capitoli.forEach(cap => {
    const isPlaceholder = cap.sezioni?.some(s => s.tipo === 'placeholder');
    const statoClass = isPlaceholder ? 'pianificato' : 'in-corso';

    const wrap = document.createElement('div');
    wrap.className = `cap-card ${statoClass}`;

    let sezioniHTML = '';
    if (cap.sezioni) {
      cap.sezioni.forEach(sez => {
        const tipoColor = {
          scena:'var(--blue)', png:'var(--purple)', scontro:'var(--red)',
          stanza:'var(--gold)', documento:'var(--amber)', oggetto:'var(--green)',
          viaggio:'var(--t2)', placeholder:'var(--t3)'
        }[sez.tipo] || 'var(--t3)';
        const tipoLabel = {
          scena:'Scena', png:'PNG', viaggio:'Viaggio', scontro:'Scontro',
          oggetto:'Oggetto', documento:'Documento', stanza:'Stanza', placeholder:'In costruzione'
        }[sez.tipo] || sez.tipo;

        sezioniHTML += `<div style="margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">`;
        sezioniHTML += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:.4rem;">
          <span style="font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid ${tipoColor};color:${tipoColor};font-family:var(--font-d);letter-spacing:.06em;text-transform:uppercase;">${tipoLabel}</span>
          <div class="cap-sec" style="margin:0;border:none;padding:0;">${sez.titolo}</div>
        </div>`;
        if (sez.marcatore) {
          sezioniHTML += `<div style="font-size:11px;color:var(--t3);font-style:italic;margin-bottom:.4rem;">🔑 ${sez.marcatore}</div>`;
        }
        sezioniHTML += `<div class="cap-text">${sez.testo}</div>`;
        if (sez.documentoCompleto) {
          sezioniHTML += `<div style="margin-top:.75rem;">
            <div style="font-size:9px;letter-spacing:.14em;color:var(--green);text-transform:uppercase;font-family:var(--font-d);margin-bottom:.4rem;">📜 Leggere ai giocatori</div>
            <div style="background:rgba(90,180,143,.05);border:1px solid rgba(90,180,143,.15);border-radius:3px;padding:.75rem 1rem;font-size:13px;color:var(--t2);line-height:1.8;white-space:pre-line;font-style:italic;">${sez.documentoCompleto}</div>
          </div>`;
        }
        if (sez.notaDM) {
          sezioniHTML += `<div style="margin-top:.6rem;">
            <div style="font-size:9px;letter-spacing:.14em;color:#b07070;text-transform:uppercase;font-family:var(--font-d);margin-bottom:.3rem;">Note DM</div>
            <div class="callout-m">${sez.notaDM}</div>
          </div>`;
        }
        sezioniHTML += `</div>`;
      });
    }

    // Musica del capitolo
    // Musica: leggo dal campo diretto del capitolo, oppure dall'array musica come fallback
    let musicaHTML = '';
    if (cap.musica) {
      musicaHTML = buildMusicPlayer(cap.id, [cap.musica]);
    } else {
      const musicaCapitolo = (torreDati.musica || []).filter(m => m.capitolo === cap.id);
      if (musicaCapitolo.length) musicaHTML = buildMusicPlayer(cap.id, musicaCapitolo);
    }

    // Pulsante puzzle — solo cap6, solo DM
    const puzzleBtnHTML = cap.id === 'cap6'
      ? `<button class="globo-dm-btn${isMaster ? ' dm-visible' : ''}" id="globo-btn" onclick="openPuzzle()">
           <span class="ico">◈</span>Mostra il Puzzle ai Giocatori
         </button>`
      : '';

    wrap.innerHTML = `
      <div class="cap-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="cap-num">${cap.icona || '◆'}</div>
        <div class="cap-title">${cap.titolo}</div>
        <span class="cap-stato ${statoClass}">${isPlaceholder ? 'Da costruire' : 'Pronto'}</span>
        <span class="cap-arr">▶</span>
      </div>
      <div class="cap-body">
        ${musicaHTML}
        <div class="cap-luogo" style="margin-top:${musicaHTML ? '.75rem' : '0'};margin-bottom:.75rem;font-style:italic;color:var(--t2);font-size:13px;">${cap.riassunto}</div>
        ${sezioniHTML}
        ${puzzleBtnHTML}
      </div>`;
    c.appendChild(wrap);
  });

  // PNG
  const pngLbl = document.createElement('div'); pngLbl.className = 'group-lbl'; pngLbl.textContent = 'PNG — Personaggi non giocanti';
  c.appendChild(pngLbl);
  torreDati.png.forEach(p => {
    const d = document.createElement('div');
    d.className = 'cap-card in-corso';
    d.innerHTML = `
      <div class="cap-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="cap-num">👤</div>
        <div class="cap-title">${p.nome}</div>
        <span class="cap-stato in-corso" style="font-size:9px;padding:2px 7px;">${p.ruolo.split('—')[0].trim()}</span>
        <span class="cap-arr">▶</span>
      </div>
      <div class="cap-body">
        <div class="cap-text" style="margin-bottom:.75rem;">${p.descrizione}</div>
        <div style="font-size:9px;letter-spacing:.14em;color:#b07070;text-transform:uppercase;font-family:var(--font-d);margin-bottom:.3rem;">Segreto DM</div>
        <div class="callout-m">${p.segreto}</div>
      </div>`;
    c.appendChild(d);
  });

  // Oggetti
  const objLbl = document.createElement('div'); objLbl.className = 'group-lbl'; objLbl.textContent = 'Oggetti chiave';
  c.appendChild(objLbl);
  torreDati.oggetti.forEach(o => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div class="card-title">${o.nome} <span style="font-size:9px;color:var(--t3);font-weight:normal;font-family:var(--font-b);">— ${o.importanza}</span></div><div class="card-body">${o.descrizione}</div>`;
    c.appendChild(d);
  });
}

// ── PUZZLE GLOBO ───────────────────────────────────
function openPuzzle() {
  const modal = document.getElementById('puzzle-modal');
  // Rimuovo e ricreo l'iframe ogni volta — bypass totale della cache
  const old = document.getElementById('puzzle-iframe');
  if (old) old.remove();
  const iframe = document.createElement('iframe');
  iframe.id = 'puzzle-iframe';
  iframe.title = 'Puzzle Globo';
  iframe.style.cssText = 'flex:1;border:none;width:100%;display:block;';
  iframe.src = 'tangram_puzzle.html?dm=1&v=' + Date.now();
  modal.appendChild(iframe);
  modal.classList.add('open');
}
function closePuzzle() {
  document.getElementById('puzzle-modal').classList.remove('open');
}

function buildMusicPlayer(capId, tracce) {
  if (!tracce || !tracce.length) return '';
  return tracce.map(m => `
    <div class="music-card">
      <div class="music-card-ico">♪</div>
      <div class="music-card-info">
        <div class="music-card-scene">${m.descrizione}</div>
        <div class="music-card-title">${m.titolo}</div>
        <div class="music-card-artist">${m.artista || ''}</div>
      </div>
    </div>`).join('');
}
